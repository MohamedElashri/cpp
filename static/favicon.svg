<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Modern C/C++ Reference — favicon
    Design: dark rounded square + C++ lettermark
      C arc    rose/pink  #f472b6  matches badge-ns family
      ++ signs  blue       #60a5fa  matches accent family
  -->

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#09090b"/>
  <!-- Subtle top-edge gloss -->
  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="62" height="32" rx="13" fill="url(#gloss)" opacity="0.05"/>

  <!--
    C arc: 270 degrees opening to the right
    Circle centre (22, 32), radius 18
    Start approx (35, 19) at 315 deg, End approx (35, 45) at 45 deg
    large-arc=1, sweep=0 (counter-clockwise) = left-facing arc = C
  -->
  <path d="M35 19 A18 18 0 1 0 35 45"
        stroke="#f472b6" stroke-width="5" fill="none"
        stroke-linecap="round"/>

  <!-- Top  +  centred at (51, 19) -->
  <line x1="51" y1="11" x2="51" y2="27" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="43" y1="19" x2="59" y2="19" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Bottom  +  centred at (51, 45) -->
  <line x1="51" y1="37" x2="51" y2="53" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="43" y1="45" x2="59" y2="45" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round"/>
</svg>
