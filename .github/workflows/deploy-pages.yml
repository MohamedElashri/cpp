name: Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Generate reference map
        run: python3 tools/build_reference_map.py

      - name: Generate ranges index
        run: python3 tools/ranges_categorizer.py --out data/ranges_index.json

      - name: Generate algorithm index
        run: python3 tools/algorithm_categorizer.py --out data/algorithm_index.json

      - name: Generate search index
        run: python3 tools/build_search_index.py

      - name: Build site
        run: hugo --minify

      - name: Minimal output smoke check
        run: python3 tools/smoke_check.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
