name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate reference map
        run: python3 tools/build_reference_map.py

      - name: Generate ranges index
        run: python3 tools/ranges_categorizer.py --out data/ranges_index.json

      - name: Generate algorithm index
        run: python3 tools/algorithm_categorizer.py --out data/algorithm_index.json

      - name: Generate search index
        run: python3 tools/build_search_index.py

      - name: Build site
        run: hugo -D

      - name: Minimal output smoke check
        run: python3 tools/smoke_check.py
